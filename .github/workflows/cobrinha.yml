name: generate animation

on:
  # roda automaticamente 1 vez por dia
  schedule:
    - cron: "0 0 * * *"

  # permite rodar manualmente
  workflow_dispatch:

  # roda a cada push na branch main
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # gera o snake baseado no gráfico de contribuições
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: LevyMatos0
            outputs:  dist/github-contribution-grid-snake.svg 
            dist/github-contribution-grid-snake-dark.svg?
    snake_color=#ff0000&
    bg_color=#0d1117&
    color_dots=#161b22,#330000,#660000,#990000,#ff0000

      # envia os arquivos gerados para a branch output
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
